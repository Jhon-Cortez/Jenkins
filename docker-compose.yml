version: '3.8'

services:

  backend:
    build:
      context: ./backend
    container_name: backend-app

    ports:
      - "8081:8081"

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    user: root

volumes:
  jenkins_home: