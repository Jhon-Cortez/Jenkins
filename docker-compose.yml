version: '3.8'

services:

  backend:
    build:
      context: ../practica-jenkins
    container_name: backend-prueba

    ports:
      - "8081:9000"

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-prueba

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    user: root

volumes:
  jenkins_home: